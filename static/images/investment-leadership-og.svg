<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Investment leadership research dashboard</title>
  <desc id="desc">A clean investment research dashboard with watchlist rankings, management quality signals, and risk discipline notes.</desc>
  <rect width="1600" height="900" fill="#f5f6f8"/>
  <rect x="80" y="80" width="1440" height="740" rx="18" fill="#ffffff" stroke="#d9dde3"/>
  <rect x="80" y="80" width="1440" height="92" rx="18" fill="#111111"/>
  <text x="128" y="138" fill="#ffffff" font-family="Manrope, Arial, sans-serif" font-size="34" font-weight="800">5AM Shift</text>
  <text x="1320" y="138" fill="#74d6a3" font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="end">Stock strategy + management quality</text>
  <g transform="translate(128 230)">
    <text x="0" y="0" fill="#111111" font-family="Manrope, Arial, sans-serif" font-size="54" font-weight="900">Best Stocks to Buy Now</text>
    <text x="0" y="56" fill="#4b5563" font-family="Manrope, Arial, sans-serif" font-size="24">Long-only watchlists filtered through execution, leadership, and risk discipline.</text>
    <rect x="0" y="110" width="720" height="380" rx="12" fill="#080808"/>
    <g font-family="Manrope, Arial, sans-serif" font-size="22" font-weight="800">
      <text x="32" y="160" fill="#f4f4f4">Rank</text><text x="132" y="160" fill="#f4f4f4">Ticker</text><text x="292" y="160" fill="#f4f4f4">Score</text><text x="430" y="160" fill="#f4f4f4">Signal</text><text x="610" y="160" fill="#f4f4f4">Grade</text>
    </g>
    <g font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="800">
      <g transform="translate(0 0)"><line x1="24" y1="190" x2="696" y2="190" stroke="#242424"/><text x="44" y="230" fill="#ffffff">1</text><text x="132" y="230" fill="#ffffff">NVDA</text><text x="308" y="230" fill="#ffffff">91</text><text x="430" y="230" fill="#74d6a3">Retest</text><text x="620" y="230" fill="#f2b84b">A+</text></g>
      <g transform="translate(0 70)"><line x1="24" y1="190" x2="696" y2="190" stroke="#242424"/><text x="44" y="230" fill="#ffffff">2</text><text x="132" y="230" fill="#ffffff">AVGO</text><text x="308" y="230" fill="#ffffff">89</text><text x="430" y="230" fill="#74d6a3">Pullback</text><text x="626" y="230" fill="#f2b84b">A</text></g>
      <g transform="translate(0 140)"><line x1="24" y1="190" x2="696" y2="190" stroke="#242424"/><text x="44" y="230" fill="#ffffff">3</text><text x="132" y="230" fill="#ffffff">AMD</text><text x="308" y="230" fill="#ffffff">88</text><text x="430" y="230" fill="#74d6a3">Flag</text><text x="626" y="230" fill="#f2b84b">A</text></g>
      <g transform="translate(0 210)"><line x1="24" y1="190" x2="696" y2="190" stroke="#242424"/><text x="44" y="230" fill="#ffffff">4</text><text x="132" y="230" fill="#ffffff">QCOM</text><text x="308" y="230" fill="#ffffff">86</text><text x="430" y="230" fill="#74d6a3">Hold</text><text x="626" y="230" fill="#f2b84b">A</text></g>
    </g>
  </g>
  <g transform="translate(930 286)">
    <rect x="0" y="0" width="430" height="116" rx="10" fill="#eef8f2" stroke="#b9e4cc"/>
    <text x="28" y="42" fill="#0b603a" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="2">MANAGEMENT QUALITY</text>
    <text x="28" y="78" fill="#111111" font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="800">Execution, culture, and capital discipline</text>
    <rect x="0" y="150" width="430" height="116" rx="10" fill="#fff8ea" stroke="#f5d69a"/>
    <text x="28" y="192" fill="#8a5a0a" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="2">RISK CONTROL</text>
    <text x="28" y="228" fill="#111111" font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="800">Defined entries and invalidation levels</text>
    <rect x="0" y="300" width="430" height="116" rx="10" fill="#f0f3f7" stroke="#d5dbe4"/>
    <text x="28" y="342" fill="#343434" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="2">INVESTOR LENS</text>
    <text x="28" y="378" fill="#111111" font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="800">Leadership drives durable growth</text>
  </g>
</svg>
