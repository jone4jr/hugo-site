{{ $url := .Permalink }}
{{ $encodedUrl := $url | urlquery }}
{{ $encodedTitle := .Title | urlquery }}
<div class="share-actions" aria-label="Share this article">
  <p class="eyebrow">Share</p>
  <div class="share-buttons">
    <a class="share-button share-button--facebook" href="https://www.facebook.com/sharer/sharer.php?u={{ $encodedUrl }}" target="_blank" rel="noopener noreferrer" aria-label="Share {{ .Title }} on Facebook">
      <span aria-hidden="true">f</span>
      <span>Facebook</span>
    </a>
    <a class="share-button share-button--linkedin" href="https://www.linkedin.com/sharing/share-offsite/?url={{ $encodedUrl }}" target="_blank" rel="noopener noreferrer" aria-label="Share {{ .Title }} on LinkedIn">
      <span aria-hidden="true">in</span>
      <span>LinkedIn</span>
    </a>
    <button class="share-button share-button--instagram" type="button" data-share-copy="{{ $url }}" aria-label="Copy link for sharing {{ .Title }} on Instagram">
      <span aria-hidden="true">ig</span>
      <span>Instagram</span>
    </button>
    <a class="share-button share-button--x" href="https://twitter.com/intent/tweet?url={{ $encodedUrl }}&text={{ $encodedTitle }}" target="_blank" rel="noopener noreferrer" aria-label="Share {{ .Title }} on X">
      <span aria-hidden="true">x</span>
      <span>X</span>
    </a>
  </div>
  <p class="share-status" data-share-status hidden>Link copied for Instagram.</p>
</div>
