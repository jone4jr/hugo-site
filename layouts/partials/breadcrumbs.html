<nav class="breadcrumbs" aria-label="Breadcrumb">
  <a href="{{ "/" | relURL }}">Home</a>
  {{ if .Section }}
    <span>/</span>
    <a href="{{ printf "/%s/" .Section | relURL }}">{{ humanize .Section }}</a>
  {{ end }}
  {{ if and .IsPage .Title }}
    <span>/</span>
    <span aria-current="page">{{ .Title }}</span>
  {{ end }}
</nav>
