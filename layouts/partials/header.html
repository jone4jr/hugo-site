<header class="site-header">
  <div class="shell header-shell">
    <a class="brand" href="{{ "/" | relURL }}">
      <span class="brand-mark">5AM</span>
      <span class="brand-copy">
        <strong>Shift</strong>
        <span>{{ .Site.Params.tagline }}</span>
      </span>
    </a>
    <button class="nav-toggle js-nav-toggle" type="button" aria-expanded="false" aria-controls="site-nav">
      <span></span>
      <span></span>
      <span></span>
      <span class="sr-only">Toggle navigation</span>
    </button>
    <nav class="site-nav js-site-nav" id="site-nav" aria-label="Main navigation">
      <ul>
        {{ range .Site.Menus.main }}
          <li>
            <a href="{{ .URL | relURL }}" class="{{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}is-active{{ end }}">{{ .Name }}</a>
          </li>
        {{ end }}
      </ul>
      <a class="button button-ghost nav-cta" href="{{ "/assessments/disc-profile/" | relURL }}">Free DISC profile</a>
    </nav>
  </div>
</header>
