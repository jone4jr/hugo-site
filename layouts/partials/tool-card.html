<article class="tool-card reveal">
  <div class="tool-card__top">
    <span class="pill">Free tool</span>
  </div>
  <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  <p>{{ .Params.summary | default .Description }}</p>
  <div class="tool-card__actions">
    <a class="text-link" href="{{ .RelPermalink }}">Open tool</a>
    {{ with .Params.download_url }}
      <a class="text-link" href="{{ . }}" download>Download</a>
    {{ end }}
  </div>
</article>
