{{ $class := .class | default "" }}
<div class="newsletter-panel {{ $class }}">
  {{ with .heading }}<h3>{{ . }}</h3>{{ end }}
  {{ with .copy }}<p>{{ . }}</p>{{ end }}
  <form class="newsletter-form js-newsletter-form" data-source="{{ .source }}" data-success="{{ .success }}">
    <label class="sr-only" for="email-{{ .source }}">Email address</label>
    <input id="email-{{ .source }}" name="email" type="email" placeholder="Enter your email" autocomplete="email" required>
    <button class="button button-primary" type="submit">{{ .button }}</button>
    <p class="newsletter-note">Free weekly note. No spam. Assessments unlock after signup.</p>
    <p class="form-message js-form-message" aria-live="polite"></p>
  </form>
</div>
