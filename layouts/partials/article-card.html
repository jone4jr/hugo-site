{{ $category := .Params.category | default "Leadership" }}
{{ $summary := .Params.summary | default .Summary }}
<article class="article-card reveal" data-category="{{ urlize $category }}">
  <div class="article-card__meta">
    <span>{{ $category }}</span>
    <span>{{ .ReadingTime }} min read</span>
  </div>
  <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
  {{ with .Params.subtitle }}<p class="article-card__subtitle">{{ . }}</p>{{ end }}
  <p class="article-card__summary">{{ $summary }}</p>
  <div class="article-card__footer">
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    <a class="text-link" href="{{ .RelPermalink }}">Read article</a>
  </div>
</article>
