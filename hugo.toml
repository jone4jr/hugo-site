baseURL = "https://5amshift.com/"
languageCode = "en-us"
title = "5AM Shift"
enableRobotsTXT = true
summaryLength = 28

[pagination]
  pagerSize = 9

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[sitemap]
  changeFreq = "weekly"
  priority = 0.8
  filename = "sitemap.xml"

[related]
  threshold = 20
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "category"
    weight = 80
  [[related.indices]]
    name = "title"
    weight = 30

[params]
  author = "Jared Jones"
  description = "Leadership development, practical leadership articles, and free assessments for plant leaders, supervisors, and ambitious operators building stronger teams."
  tagline = "Leadership development from the floor to the front office."
  city = "Dayton, OH"
  defaultImage = "/images/og-default.svg"
  mainTopic = "Leadership Development"
  siteTopics = ["leadership development", "plant leadership", "supervisor training", "operational leadership", "manufacturing leadership blog"]
  contactEmail = "hello@5amshift.com"

  [params.newsletter]
    heading = "Get the Sunday leadership note"
    blurb = "One sharp leadership lesson each week, plus access to the assessment library."
    button = "Subscribe and unlock the DISC profile"
    action = ""
    success = "You are in. Your assessment library is now unlocked on this device."

[[menu.main]]
  name = "Home"
  url = "/"
  weight = 10

[[menu.main]]
  name = "Articles"
  url = "/posts/"
  weight = 20

[[menu.main]]
  name = "Assessments"
  url = "/assessments/"
  weight = 30

[[menu.main]]
  name = "Leadership Development"
  url = "/leadership-development/"
  weight = 40

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 50
