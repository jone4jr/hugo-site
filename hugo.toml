baseURL = "https://www.5amshift.com/"
languageCode = "en-us"
title = "5AM Shift"
enableRobotsTXT = true
summaryLength = 28

[pagination]
  pagerSize = 9

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[sitemap]
  changeFreq = "weekly"
  priority = 0.8
  filename = "sitemap.xml"

[related]
  threshold = 20
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "category"
    weight = 80
  [[related.indices]]
    name = "title"
    weight = 30

[params]
  author = "Jared Jones"
  description = "Manufacturing leadership blog and leadership development resource for plant managers, supervisors, and operations leaders focused on accountability, employee retention, communication, and stronger teams."
  tagline = "Leadership development from the floor to the front office."
  city = "Dayton, OH"
  defaultImage = "/images/og-default.svg"
  mainTopic = "Manufacturing Leadership"
  siteTopics = ["manufacturing leadership", "plant manager leadership", "supervisor leadership training", "operations leadership", "employee retention leadership", "accountability in the workplace", "leadership communication"]
  contactEmail = "hello@5amshift.com"
  googleSiteVerification = "XRsg8z4wIMngioHdOADV91C8ps-pjw16kvkGBcDATq0"

  [params.newsletter]
    heading = "Join the 5AM Shift leadership list"
    blurb = "Get practical leadership updates, new articles, and access to the assessment library."
    button = "Subscribe and unlock the library"
    provider = "formsubmit"
    recipient = "hello@5amshift.com"
    action = ""
    subject = "New 5AM Shift subscriber"
    success = "Thanks. Your assessment library is now unlocked on this device."

