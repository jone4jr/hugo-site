baseURL = "https://www.5amshift.com/"
languageCode = "en-us"
title = "5AM Shift"
enableRobotsTXT = true
summaryLength = 28

[pagination]
  pagerSize = 9

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[sitemap]
  changeFreq = "weekly"
  priority = 0.8
  filename = "sitemap.xml"

[related]
  threshold = 20
  includeNewer = true
  toLower = true
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "category"
    weight = 80
  [[related.indices]]
    name = "title"
    weight = 30

[params]
  author = "Jared Jones"
  description = "Weekly long-only stock watchlists, investment strategy notes, and practical leadership essays for operators who want disciplined decision-making."
  tagline = "Weekly stock strategy and practical leadership essays."
  city = "Dayton, OH"
  defaultImage = "/images/og-default.svg"
  mainTopic = "Investment Strategy and Leadership"
  siteTopics = ["best stocks to buy now", "weekly stock watchlist", "investment strategy", "stock market watchlist", "long-only stock ideas", "leadership blog", "operations leadership", "plant manager leadership"]
  contactEmail = "hello@5amshift.com"
  googleSiteVerification = "XRsg8z4wIMngioHdOADV91C8ps-pjw16kvkGBcDATq0"

  [params.newsletter]
    heading = "Join the 5AM Shift research list"
    blurb = "Get weekly stock watchlists, investment strategy notes, leadership essays, and practical tools."
    button = "Subscribe"
    provider = "formsubmit"
    recipient = "hello@5amshift.com"
    action = ""
    subject = "New 5AM Shift subscriber"
    success = "Thanks. You are on the 5AM Shift list."

